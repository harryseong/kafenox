name: Kafenox
options:
  bundleIdPrefix: com.harryseong.kafenox
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "6.0"

targets:
  Kafenox:
    type: application
    platform: iOS
    sources:
      - path: Kafenox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.harryseong.kafenox
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Kafenox uses your camera to photograph coffee bag labels so it can extract the coffee details automatically."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_TEAM: ""
    info:
      path: Kafenox/Info.plist
      properties:
        UIAppFonts:
          - HankenGrotesk-Variable.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
